<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📈 코스피 고점 판독기</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/static/pretendard.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fafbfc;--card:#ffffff;--border:#e5e7eb;
  --text:#111827;--secondary:#6b7280;--tertiary:#9ca3af;
  --green:#059669;--green-bg:#ecfdf5;
  --yellow:#d97706;--yellow-bg:#fffbeb;
  --orange:#ea580c;--orange-bg:#fff7ed;
  --red:#dc2626;--red-bg:#fef2f2;
  --primary:#2563eb;
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  line-height:1.6;
  padding:16px;
  max-width:1200px;
  margin:0 auto
}
h1{font-size:1.6rem;margin-bottom:4px;font-weight:700}
.subtitle{color:var(--secondary);font-size:.85rem;margin-bottom:20px}

.risk-banner{
  display:inline-flex;
  align-items:center;
  gap:12px;
  padding:12px 16px;
  border-radius:8px;
  margin-bottom:20px;
  font-weight:600;
  border:1px solid;
}
.risk-DANGER{
  background:var(--red-bg);
  border-color:var(--red);
  color:var(--red);
}
.risk-WARNING{
  background:var(--orange-bg);
  border-color:var(--orange);
  color:var(--orange);
}
.risk-CAUTION{
  background:var(--yellow-bg);
  border-color:var(--yellow);
  color:var(--yellow);
}
.risk-NORMAL{
  background:var(--green-bg);
  border-color:var(--green);
  color:var(--green);
}
.risk-emoji{font-size:1.5rem;flex-shrink:0}
.risk-label{font-size:1rem}
.risk-count{font-size:.85rem;color:var(--secondary);margin-left:8px}

.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.chip{
  background:var(--card);
  border:1px solid var(--border);
  padding:10px 14px;
  border-radius:6px;
  font-size:.85rem;
  color:var(--text);
  font-weight:500;
  white-space:nowrap;
}

.grid{display:grid;gap:16px;margin-bottom:16px}
.grid-2{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}
.grid-3{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
.grid-4{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:0;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
}
.card h2{
  font-size:1rem;
  font-weight:600;
  padding:16px 20px;
  border-bottom:1px solid #f3f4f6;
  display:flex;
  align-items:center;
  gap:12px;
  margin:0;
}
.card h2::before{
  content:attr(data-index);
  display:flex;
  align-items:center;
  justify-content:center;
  width:24px;
  height:24px;
  background:var(--primary);
  color:white;
  border-radius:50%;
  font-size:.85rem;
  font-weight:700;
}
.card-body{padding:0 20px 20px}
.card h3{
  font-size:.85rem;
  font-weight:600;
  color:var(--text);
  margin:16px 0 10px;
  text-transform:uppercase;
  letter-spacing:.5px;
}
.card h3:first-child{margin-top:0}

.metric{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px 0;
  border-bottom:1px solid #f3f4f6;
}
.metric:last-child{border-bottom:none}
.metric-label{color:var(--secondary);font-size:.85rem;font-weight:500}
.metric-value{font-weight:600;font-size:.9rem;color:var(--text)}

.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
.dot-green{background:var(--green)}.dot-yellow{background:var(--yellow)}.dot-orange{background:var(--orange)}.dot-red{background:var(--red)}

.warning-list{list-style:none;padding:20px}
.warning-list li{
  display:flex;
  align-items:flex-start;
  gap:10px;
  padding:8px 0;
  font-size:.85rem;
  color:var(--text);
}
.warning-list li::before{
  content:'';
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:20px;
  height:20px;
  background:var(--red-bg);
  border:1px solid var(--red);
  border-radius:50%;
  color:var(--red);
  flex-shrink:0;
  font-size:.7rem;
}
.warning-list li.caution::before{
  background:var(--yellow-bg);
  border-color:var(--yellow);
}

.bar-container{
  background:#f3f4f6;
  border-radius:4px;
  height:6px;
  overflow:hidden;
  margin-top:4px;
}
.bar-fill{height:100%;border-radius:4px;transition:width .3s}

.tag{
  display:inline-block;
  padding:4px 10px;
  border-radius:4px;
  font-size:.75rem;
  font-weight:600;
  text-transform:uppercase;
}
.tag-danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red)}
.tag-warning{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange)}
.tag-caution{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow)}
.tag-normal{background:var(--green-bg);color:var(--green);border:1px solid var(--green)}

.stock-card{
  display:flex;
  gap:12px;
  align-items:flex-start;
  padding:12px;
  background:#fafbfc;
  border:1px solid var(--border);
  border-radius:6px;
  margin-bottom:12px;
}
.stock-icon{font-size:1.5rem;flex-shrink:0}
.stock-info{flex:1}
.stock-price{font-size:1rem;font-weight:700;color:var(--text)}
.stock-sub{color:var(--secondary);font-size:.8rem;margin-top:2px}
.stock-returns{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.ret{
  font-size:.75rem;
  padding:3px 8px;
  border-radius:4px;
  font-weight:500;
}
.ret-up{background:var(--green-bg);color:var(--green);border:1px solid var(--green)}
.ret-down{background:var(--red-bg);color:var(--red);border:1px solid var(--red)}

.elliott-box{
  background:#fafbfc;
  border:1px solid var(--border);
  border-radius:6px;
  padding:12px;
  margin-top:12px;
  font-size:.85rem;
}
.elliott-box.normal{background:var(--green-bg);border-color:var(--green)}

.ts{
  text-align:center;
  color:var(--tertiary);
  font-size:.8rem;
  padding:16px;
  border-top:1px solid var(--border);
  margin-top:20px;
}

.earnings-card{
  border:2px solid var(--primary);
  box-shadow:0 2px 8px rgba(37,99,235,.12);
}
.earnings-card h2{
  background:linear-gradient(135deg,#2563eb 0%,#1d4ed8 100%);
  color:#fff;
  border-bottom:none;
}
.earnings-card h2::before{
  background:rgba(255,255,255,.25);
  color:#fff;
}
.earnings-chart-wrap{
  position:relative;
  width:100%;
  height:340px;
  padding:16px 20px 8px;
}
.earnings-summary{
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 20px 12px;
  font-size:.82rem;
  color:var(--secondary);
}
.earnings-summary .base-info{flex:1}
.earnings-insights{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:0 20px 20px;
}
.insight-pill{
  padding:12px 14px;
  background:#fafbfc;
  border:1px solid var(--border);
  border-radius:8px;
  font-size:.82rem;
  transition:border-color .2s;
}
.insight-pill.peaked{
  background:var(--red-bg);
  border-color:var(--red);
}
.insight-pill.rising{
  background:var(--green-bg);
  border-color:var(--green);
}
.insight-pill .company{font-weight:700;color:var(--text);font-size:.9rem;margin-bottom:4px}
.insight-pill .direction{font-weight:700;font-size:1rem}
.insight-pill .sub-info{font-size:.75rem;color:var(--secondary);margin-top:3px}
.insight-pill .peak-warn{
  display:inline-flex;
  align-items:center;
  gap:4px;
  margin-top:6px;
  padding:3px 8px;
  background:var(--red);
  color:#fff;
  border-radius:4px;
  font-size:.72rem;
  font-weight:600;
}
.no-data-msg{
  text-align:center;
  padding:40px 20px;
  color:var(--tertiary);
  font-size:.9rem;
}
@media(max-width:600px){
  .earnings-insights{grid-template-columns:1fr}
}

.loading{text-align:center;padding:60px;color:var(--secondary)}
.loading .spinner{
  display:inline-block;
  width:32px;
  height:32px;
  border:3px solid var(--border);
  border-top-color:var(--primary);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

.back-link{
  display:inline-block;
  color:var(--primary);
  text-decoration:none;
  font-size:.85rem;
  margin-bottom:12px;
  opacity:.8;
  font-weight:500;
}
.back-link:hover{opacity:1;text-decoration:underline}

@media(max-width:600px){
  body{padding:10px}
  h1{font-size:1.3rem}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
  .risk-banner{flex-direction:column;gap:8px;text-align:center}
  .risk-count{margin-left:0}
}
</style>
</head>
<body>
<a class="back-link" href="https://jinhae8971.github.io/github-actions-dashboard/">← 대시보드로 돌아가기</a>
<h1>📈 코스피 중장기 고점 판독기</h1>
<p class="subtitle">5대 프레임워크 기반 자동 분석 · 매일 17:00 KST 업데이트</p>

<div id="app">
  <div class="loading"><div class="spinner"></div><p style="margin-top:12px">분석 데이터 로딩 중...</p></div>
</div>

<script>
const $ = s => document.querySelector(s);
const fmt = (n, d=1) => n == null ? '-' : Number(n).toLocaleString('ko-KR', {minimumFractionDigits:d, maximumFractionDigits:d});
const fmtInt = n => n == null ? '-' : Number(n).toLocaleString('ko-KR');
const pct = n => n == null ? '-' : (n >= 0 ? '+' : '') + fmt(n) + '%';

function riskColor(level) {
  const m = {DANGER:'red',WARNING:'orange',CAUTION:'yellow',NORMAL:'green'};
  return m[level] || 'muted';
}
function riskTag(level) {
  const cls = {DANGER:'danger',WARNING:'warning',CAUTION:'caution',NORMAL:'normal'}[level]||'normal';
  return `<span class="tag tag-${cls}">${level}</span>`;
}
function dotFor(ok, warn) {
  if (warn) return '<span class="status-dot dot-red"></span>';
  if (ok === false) return '<span class="status-dot dot-yellow"></span>';
  return '<span class="status-dot dot-green"></span>';
}
function retSpan(val, label) {
  if (val == null) return '';
  const cls = val >= 0 ? 'ret-up' : 'ret-down';
  return `<span class="ret ${cls}">${label} ${pct(val)}</span>`;
}
function barHTML(value, max, color) {
  const w = Math.min(100, (value/max)*100);
  return `<div class="bar-container"><div class="bar-fill" style="width:${w}%;background:var(--${color})"></div></div>`;
}

async function loadData() {
  try {
    const r = await fetch('reports/latest.json?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return await r.json();
  } catch(e) {
    console.error('데이터 로드 실패:', e);
    return null;
  }
}

function render(d) {
  const {data, risk_level, risk_emoji, total_warnings, warnings, timestamp, content} = d;
  const v = data.valuation;
  const semi = data.semiconductor;
  const sd = data.supply_demand;
  const tech = data.technical;
  const el = tech.elliott || {};

  const ts = new Date(timestamp);
  const tsStr = ts.toLocaleString('ko-KR', {timeZone:'Asia/Seoul', year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'});

  let dangerCnt = 0, cautionCnt = 0;
  warnings.forEach(w => { if(w.includes('🔴')) dangerCnt++; else cautionCnt++; });

  let html = '';

  // Risk Banner (Pill-style)
  html += `
  <div class="risk-banner risk-${risk_level}">
    <span class="risk-emoji">${risk_emoji}</span>
    <span class="risk-label">위험도: ${risk_level}</span>
    <span class="risk-count">🔴 ${dangerCnt}건 · ⚠️ ${cautionCnt}건</span>
  </div>`;

  // Key Metrics Chips (KPI Strip)
  html += `<div class="chip-row">
    <div class="chip">코스피 ${fmtInt(v.kospi_price)}pt</div>
    <div class="chip">버핏지수 ${fmt(v.buffett_ratio)}%</div>
    <div class="chip">이격도(12M) ${fmt(v.disparity_252d)}%</div>
    <div class="chip">RSI ${fmt(tech.rsi_14)}</div>
    <div class="chip">BB%B ${fmt(tech.bb_pct)}%</div>
    <div class="chip">변동성(20D) ${fmt(sd.realized_vol_20d)}%</div>
    <div class="chip">USD/KRW ${fmtInt(sd.usdkrw)}</div>
    <div class="chip">VIX ${fmt(sd.vix)}</div>
  </div>`;

  // ★ Earnings Trend Chart — 최상단 핵심 섹션
  const et = data.earnings_trend;
  html += `<div class="card earnings-card" style="margin-bottom:16px">
    <h2 data-index="★">이익추정치 트렌드 — 고점 판독 핵심 지표</h2>`;

  if (et && et.labels && et.labels.length >= 2) {
    html += `<div class="earnings-summary">
      <span class="base-info">📅 기준일: ${et.base_date} · 데이터: ${et.labels.length}주</span>
    </div>`;
    html += `<div class="earnings-chart-wrap"><canvas id="earningsChart"></canvas></div>`;
    if (et.insights && et.insights.length > 0) {
      html += `<div class="earnings-insights">`;
      et.insights.forEach(ins => {
        const isPeaked = ins.peaked === true;
        const arrow = ins.direction === '상향' ? '📈' : ins.direction === '하향' ? '📉' : '➡️';
        const dirColor = ins.direction === '상향' ? 'var(--green)' : ins.direction === '하향' ? 'var(--red)' : 'var(--secondary)';
        const pillClass = isPeaked ? 'peaked' : (ins.change_from_base > 0 ? 'rising' : '');
        const momText = ins.recent_momentum != null
          ? `모멘텀: ${ins.recent_momentum > 0 ? '+' : ''}${ins.recent_momentum}%p`
          : '';
        html += `<div class="insight-pill ${pillClass}">
          <div class="company">${ins.company}</div>
          <div class="direction" style="color:${dirColor}">${arrow} ${pct(ins.change_from_base)}</div>
          ${ins.latest_eps != null ? `<div class="sub-info">Forward EPS: ${fmt(ins.latest_eps,2)}</div>` : ''}
          ${momText ? `<div class="sub-info">${momText}</div>` : ''}
          ${isPeaked ? `<div class="peak-warn">⚠️ 피크 대비 ${ins.decline_from_peak != null ? ins.decline_from_peak.toFixed(1) + '%p' : ''} 하락 — 추정치 꺾임</div>` : ''}
        </div>`;
      });
      html += `</div>`;
    }
  } else {
    html += `<div class="no-data-msg">📊 이익추정치 데이터가 아직 충분하지 않습니다.<br>워크플로우가 2회 이상 실행되면 차트가 표시됩니다.</div>`;
  }
  html += `</div>`;

  // Warnings Card
  html += `<div class="card" style="margin-bottom:16px">
    <h2>🚨 경고 신호 목록</h2>
    <ul class="warning-list">
      ${warnings.map(w => `<li class="${w.includes('🔴')?'':'caution'}">${w}</li>`).join('')}
    </ul>
  </div>`;

  // 4 Framework Grid
  html += '<div class="grid grid-2">';

  // 1. Valuation
  html += `<div class="card">
    <h2 data-index="①">밸류에이션 &amp; 과열</h2>
    <div class="card-body">
    <div class="metric"><span class="metric-label">코스피</span><span class="metric-value">${fmtInt(v.kospi_price)} pt</span></div>
    <div class="metric"><span class="metric-label">52주 고점</span><span class="metric-value">${fmtInt(v.kospi_52w_high)} (${pct(v.pct_from_52w_high)})</span></div>
    <div class="metric"><span class="metric-label">버핏 지수 (시총/GDP)</span><span class="metric-value" style="color:var(--${v.buffett_ratio>=180?'red':v.buffett_ratio>=150?'orange':'green'})">${fmt(v.buffett_ratio)}%</span></div>
    ${barHTML(v.buffett_ratio, 200, v.buffett_ratio>=180?'red':v.buffett_ratio>=150?'orange':'green')}
    <div class="metric"><span class="metric-label">12개월 이격도</span><span class="metric-value" style="color:var(--${v.disparity_252d>=130?'red':v.disparity_252d>=120?'orange':'green'})">${fmt(v.disparity_252d)}%</span></div>
    ${barHTML(v.disparity_252d, 200, v.disparity_252d>=130?'red':v.disparity_252d>=120?'orange':'green')}
    <div class="metric"><span class="metric-label">200일 이격도</span><span class="metric-value">${fmt(v.disparity_200d)}%</span></div>
    <div class="metric"><span class="metric-label">60일 이격도</span><span class="metric-value">${fmt(v.disparity_60d)}%</span></div>
    <h3>삼성전자</h3>
    <div class="metric"><span class="metric-label">Forward PER</span><span class="metric-value">${fmt(v.samsung_forward_per)}</span></div>
    <div class="metric"><span class="metric-label">이익 성장률</span><span class="metric-value" style="color:var(--green)">${pct(v.samsung_earnings_growth ? v.samsung_earnings_growth*100 : null)}</span></div>
    <div class="metric"><span class="metric-label">컨센서스 목표가</span><span class="metric-value">${fmtInt(v.samsung_target_price)}원</span></div>
    <h3>SK하이닉스</h3>
    <div class="metric"><span class="metric-label">Forward PER</span><span class="metric-value">${fmt(v.hynix_forward_per)}</span></div>
    <div class="metric"><span class="metric-label">컨센서스 목표가</span><span class="metric-value">${fmtInt(v.hynix_target_price)}원</span></div>
    <div class="metric"><span class="metric-label">시총 합산 (삼+하)</span><span class="metric-value">${fmt(v.samsung_hynix_combined_mcap)}조</span></div>
    <div class="metric"><span class="metric-label">코스피 내 비중</span><span class="metric-value">${fmt(v.samsung_hynix_weight_est ? v.samsung_hynix_weight_est*100 : null)}%</span></div>
    </div>
  </div>`;

  // 2. Semiconductor
  html += `<div class="card">
    <h2 data-index="②">반도체 업황</h2>
    <div class="card-body">
    <div class="stock-card">
      <div class="stock-icon">🏭</div>
      <div class="stock-info">
        <div class="stock-price">삼성전자 ${fmtInt(semi.samsung.price)}원</div>
        <div class="stock-sub">52주高 ${fmtInt(semi.samsung['52w_high'])} (${pct(semi.samsung.pct_from_52w_high)})</div>
        <div class="stock-returns">
          ${retSpan(semi.samsung.ret_1m, '1M')}${retSpan(semi.samsung.ret_3m, '3M')}${retSpan(semi.samsung.ret_6m, '6M')}${retSpan(semi.samsung.ret_12m, '12M')}
        </div>
        <div style="margin-top:4px;font-size:.75rem;color:var(--secondary)">
          ${semi.samsung.above_ma_200d ? '🟢' : '🔴'} 200MA ${semi.samsung.above_ma_200d ? '위' : '아래'} ·
          ${semi.samsung.above_ma_60d ? '🟢' : '🔴'} 60MA ${semi.samsung.above_ma_60d ? '위' : '아래'}
        </div>
      </div>
    </div>
    <div class="stock-card">
      <div class="stock-icon">💾</div>
      <div class="stock-info">
        <div class="stock-price">SK하이닉스 ${fmtInt(semi.hynix.price)}원</div>
        <div class="stock-sub">52주高 ${fmtInt(semi.hynix['52w_high'])} (${pct(semi.hynix.pct_from_52w_high)})</div>
        <div class="stock-returns">
          ${retSpan(semi.hynix.ret_1m, '1M')}${retSpan(semi.hynix.ret_3m, '3M')}${retSpan(semi.hynix.ret_6m, '6M')}${retSpan(semi.hynix.ret_12m, '12M')}
        </div>
        <div style="margin-top:4px;font-size:.75rem;color:var(--secondary)">
          ${semi.hynix.above_ma_200d ? '🟢' : '🔴'} 200MA ${semi.hynix.above_ma_200d ? '위' : '아래'} ·
          ${semi.hynix.above_ma_60d ? '🟢' : '🔴'} 60MA ${semi.hynix.above_ma_60d ? '위' : '아래'}
        </div>
      </div>
    </div>
    <h3>글로벌 반도체</h3>
    <div class="metric"><span class="metric-label">SOXX (반도체 ETF)</span><span class="metric-value">${fmt(semi.soxx_price)} (3M ${pct(semi.soxx_ret_3m)})</span></div>
    <div class="metric"><span class="metric-label">SOXX 200MA 이격도</span><span class="metric-value">${fmt(semi.soxx_disparity_200d)}%</span></div>
    <div class="metric"><span class="metric-label">NVDA</span><span class="metric-value">${fmt(semi.nvda_price)} (3M ${pct(semi.nvda_ret_3m)})</span></div>
    <div class="metric"><span class="metric-label">NVDA 200MA 이격도</span><span class="metric-value">${fmt(semi.nvda_disparity_200d)}%</span></div>
    <div class="metric"><span class="metric-label">하이닉스-삼성 상대강도(3M)</span><span class="metric-value">${pct(semi.hynix_vs_samsung_rel_3m)}</span></div>
    </div>
  </div>`;

  // 3. Supply & Demand
  html += `<div class="card">
    <h2 data-index="③">수급 &amp; 심리</h2>
    <div class="card-body">
    <h3>변동성</h3>
    <div class="metric"><span class="metric-label">20일 실현변동성 (VKOSPI↔)</span><span class="metric-value" style="color:var(--${sd.realized_vol_20d>=40?'red':sd.realized_vol_20d>=25?'orange':'green'})">${fmt(sd.realized_vol_20d)}%</span></div>
    ${barHTML(sd.realized_vol_20d, 60, sd.realized_vol_20d>=40?'red':sd.realized_vol_20d>=25?'orange':'green')}
    <div class="metric"><span class="metric-label">60일 실현변동성</span><span class="metric-value">${fmt(sd.realized_vol_60d)}%</span></div>
    <div class="metric"><span class="metric-label">1년 실현변동성</span><span class="metric-value">${fmt(sd.realized_vol_1y)}%</span></div>
    <div class="metric"><span class="metric-label">VIX (미국 공포지수)</span><span class="metric-value" style="color:var(--${sd.vix>=30?'red':sd.vix>=20?'yellow':'green'})">${fmt(sd.vix)}</span></div>
    <h3>외국인 수급</h3>
    <div class="metric"><span class="metric-label">USD/KRW</span><span class="metric-value">${fmtInt(sd.usdkrw)} (3M ${pct(sd.usdkrw_ret_3m)})</span></div>
    <div class="metric"><span class="metric-label">USD/KRW 60MA</span><span class="metric-value">${fmtInt(sd.usdkrw_ma60)} ${sd.usdkrw_above_ma60 ? '🔴 위' : '🟢 아래'}</span></div>
    <div class="metric"><span class="metric-label">EWY (한국 ETF)</span><span class="metric-value">${fmt(sd.ewy_price)}</span></div>
    <div class="metric"><span class="metric-label">EWY 수익률</span>
      <span class="metric-value">${retSpan(sd.ewy_ret_1m,'1M')} ${retSpan(sd.ewy_ret_3m,'3M')}</span>
    </div>
    <div class="metric"><span class="metric-label">EWY 200MA 이격도</span><span class="metric-value">${fmt(sd.ewy_disparity_200d)}%</span></div>
    <h3>빚투 과열</h3>
    <div class="metric"><span class="metric-label">레버리지ETF 거래량비</span><span class="metric-value" style="color:var(--${sd.kodex_lev_vol_ratio>=1.5?'red':sd.kodex_lev_vol_ratio>=1.2?'orange':'green'})">${fmt(sd.kodex_lev_vol_ratio,2)}x</span></div>
    </div>
  </div>`;

  // 4. Technical
  const elliottRisk = el.wave_risk || 'NORMAL';
  html += `<div class="card">
    <h2 data-index="④">기술적 분석</h2>
    <div class="card-body">
    <div class="metric"><span class="metric-label">RSI(14)</span><span class="metric-value" style="color:var(--${tech.rsi_14>=80?'red':tech.rsi_14>=70?'orange':'green'})">${fmt(tech.rsi_14)}</span></div>
    ${barHTML(tech.rsi_14, 100, tech.rsi_14>=80?'red':tech.rsi_14>=70?'orange':'green')}
    <div class="metric"><span class="metric-label">볼린저밴드 %B</span><span class="metric-value" style="color:var(--${tech.bb_pct>=95?'red':tech.bb_pct>=80?'orange':'green'})">${fmt(tech.bb_pct)}%</span></div>
    ${barHTML(tech.bb_pct, 100, tech.bb_pct>=95?'red':tech.bb_pct>=80?'orange':'green')}
    <div class="metric"><span class="metric-label">MACD 히스토그램</span><span class="metric-value" style="color:var(--${tech.macd_bullish?'green':'red'})">${fmt(tech.macd_histogram)} ${tech.macd_bullish?'📈':'📉'}</span></div>
    <div class="metric"><span class="metric-label">이평선 정배열</span><span class="metric-value">${tech.ma_perfect_align?'✅ 정배열':'❌ 역배열'}</span></div>
    <h3>이동평균</h3>
    <div class="metric"><span class="metric-label">5일</span><span class="metric-value">${fmtInt(tech.ma_5d)}</span></div>
    <div class="metric"><span class="metric-label">20일</span><span class="metric-value">${fmtInt(tech.ma_20d)}</span></div>
    <div class="metric"><span class="metric-label">60일</span><span class="metric-value">${fmtInt(tech.ma_60d)}</span></div>
    <div class="metric"><span class="metric-label">120일</span><span class="metric-value">${fmtInt(tech.ma_120d)}</span></div>
    <div class="metric"><span class="metric-label">200일</span><span class="metric-value">${fmtInt(tech.ma_200d)}</span></div>
    <div class="metric"><span class="metric-label">252일 (12M)</span><span class="metric-value">${fmtInt(tech.ma_252d)}</span></div>
    <div class="elliott-box ${elliottRisk==='NORMAL'?'normal':''}">
      <div style="font-weight:700;margin-bottom:6px">🌊 엘리어트 파동 ${riskTag(elliottRisk)}</div>
      <div style="font-size:.85rem">${el.wave_position || '-'}</div>
      <div style="font-size:.8rem;color:var(--secondary);margin-top:6px">${el.wave_desc || ''}</div>
      <div style="margin-top:8px;font-size:.78rem;display:flex;gap:12px;flex-wrap:wrap">
        <span>2Y 저점 대비: <b style="color:var(--green)">${pct(el.pct_from_2y_low)}</b></span>
        <span>2Y 고점 대비: <b style="color:var(--red)">${pct(el.pct_from_2y_high)}</b></span>
      </div>
    </div>
    </div>
  </div>`;

  html += '</div>'; // grid-2

  // Timestamp
  html += `<div class="ts">마지막 업데이트: ${tsStr} · ⚠️ 본 리포트는 AI 기반 자동 분석으로, 투자 권유가 아닙니다.</div>`;

  $('#app').innerHTML = html;
}

function renderEarningsChart(et) {
  if (!et || !et.labels || et.labels.length < 2) return;
  const canvas = document.getElementById('earningsChart');
  if (!canvas) return;

  // Format date labels (MM/DD)
  const labels = et.labels.map(d => {
    const parts = d.split('-');
    return parts[1] + '/' + parts[2];
  });

  const datasets = [];
  const cfgs = [
    { key: 'samsung', label: '삼성전자', color: '#2563eb', dash: [] },
    { key: 'hynix',   label: 'SK하이닉스', color: '#111827', dash: [] },
    { key: 'micron',  label: '마이크론',   color: '#dc2626', dash: [5,5] },
  ];

  cfgs.forEach(cfg => {
    const vals = et[cfg.key];
    if (vals && vals.some(v => v !== null)) {
      datasets.push({
        label: cfg.label,
        data: vals,
        borderColor: cfg.color,
        backgroundColor: cfg.color + '18',
        borderWidth: 2.5,
        borderDash: cfg.dash,
        pointRadius: vals.length > 30 ? 0 : 3,
        pointHoverRadius: 5,
        tension: 0.3,
        spanGaps: true,
        fill: false,
      });
    }
  });

  new Chart(canvas, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'top',
          labels: { font: { family: 'Pretendard', size: 12, weight: '600' }, padding: 16, usePointStyle: true }
        },
        tooltip: {
          backgroundColor: 'rgba(0,0,0,.85)',
          titleFont: { family: 'Pretendard', size: 12 },
          bodyFont: { family: 'Pretendard', size: 12 },
          callbacks: {
            title: items => et.labels[items[0].dataIndex] || '',
            label: item => `${item.dataset.label}: ${item.parsed.y != null ? (item.parsed.y >= 0 ? '+' : '') + item.parsed.y.toFixed(1) + '%' : '-'}`
          }
        },
        annotation: undefined,
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { font: { family: 'Pretendard', size: 11 }, maxTicksLimit: 12, color: '#9ca3af' }
        },
        y: {
          grid: { color: '#f3f4f6' },
          ticks: {
            font: { family: 'Pretendard', size: 11 },
            color: '#9ca3af',
            callback: v => (v >= 0 ? '+' : '') + v + '%'
          },
          title: {
            display: true,
            text: '기준일 대비 변화율 (%)',
            font: { family: 'Pretendard', size: 11, weight: '500' },
            color: '#9ca3af'
          }
        }
      }
    }
  });
}

loadData().then(d => {
  if (!d) {
    $('#app').innerHTML = '<div class="card" style="text-align:center;padding:40px"><h2>⚠️ 데이터 로드 실패</h2><p style="color:var(--secondary);margin-top:8px">reports/latest.json을 확인해주세요.</p></div>';
    return;
  }
  render(d);
  // Render Chart.js after DOM is ready
  if (d.data && d.data.earnings_trend) {
    renderEarningsChart(d.data.earnings_trend);
  }
});
</script>
